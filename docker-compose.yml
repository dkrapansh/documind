services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: documind
      POSTGRES_PASSWORD: documind
      POSTGRES_DB: documind
    ports:
      - "5433:5432"
    volumes:
      - documind_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U documind" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  documind_pgdata:
